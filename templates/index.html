<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrMovie - Sistem Rekomendasi Film</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="navbar">
        <div class="container nav-wrap">
            <div class="brand">UrMovie</div>
            <div class="nav-links">
                <button class="nav-btn active" id="homeTab" type="button">Beranda</button>
                <button class="nav-btn" id="recommendTab" type="button">Rekomendasi</button>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>UrMovie</h1>
            <p>Temukan film terbaik dengan Item-based Collaborative Filtering dan Cosine Similarity</p>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari judul film...">
                <select id="genreSelect">
                    <option value="all">Semua Genre</option>
                    {% for genre in genres %}
                    <option value="{{ genre }}">{{ genre }}</option>
                    {% endfor %}
                </select>
                <button id="searchBtn" type="button">Cari</button>
            </div>
        </div>
    </section>

    <main class="container">
        <section id="homeSection">
            <div class="section-header">
                <h2 id="sectionTitle">Film Populer</h2>
                <p id="movieCount"></p>
            </div>
            <div id="moviesGrid" class="movie-grid"></div>
        </section>

        <section id="recommendSection" class="hidden">
            <div class="section-header">
                <h2>Rekomendasi Pilihanmu</h2>
                <p>Pilih beberapa film dari beranda, lalu klik tombol rekomendasi.</p>
            </div>

            <div class="liked-panel">
                <h3>Film yang Dipilih</h3>
                <div id="likedMovies" class="liked-grid"></div>
                <button id="recommendBtn" class="primary-btn" type="button" disabled>Lihat Rekomendasi</button>
            </div>

            <div class="recommendation-panel">
                <h3>Hasil Rekomendasi</h3>
                <div id="recommendGrid" class="movie-grid"></div>
            </div>
        </section>
    </main>

    <div id="movieModal" class="modal hidden">
        <div class="modal-content">
            <button id="closeModal" class="close-btn" type="button" aria-label="Tutup modal">&times;</button>

            <div class="modal-body">
                <div class="modal-poster">
                    <img id="modalPoster" src="" alt="Poster Film">
                </div>

                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <p><strong>Tahun:</strong> <span id="modalYear"></span></p>
                    <p><strong>Genre:</strong> <span id="modalGenres"></span></p>
                    <p><strong>Rating:</strong> <span id="modalRating"></span></p>
                    <p><strong>Jumlah Rating:</strong> <span id="modalRatingCount"></span></p>
                    <button id="modalLikeBtn" class="primary-btn" type="button">Pilih Film</button>
                </div>
            </div>

            <div class="similar-block">
                <h3>Film Serupa</h3>
                <div id="similarMovies" class="movie-grid small-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            likedMovies: new Map(),
            currentMovie: null
        };

        const homeSection = document.getElementById("homeSection");
        const recommendSection = document.getElementById("recommendSection");
        const homeTab = document.getElementById("homeTab");
        const recommendTab = document.getElementById("recommendTab");

        const searchInput = document.getElementById("searchInput");
        const genreSelect = document.getElementById("genreSelect");
        const searchBtn = document.getElementById("searchBtn");
        const moviesGrid = document.getElementById("moviesGrid");
        const movieCount = document.getElementById("movieCount");
        const sectionTitle = document.getElementById("sectionTitle");

        const likedMovies = document.getElementById("likedMovies");
        const recommendBtn = document.getElementById("recommendBtn");
        const recommendGrid = document.getElementById("recommendGrid");

        const movieModal = document.getElementById("movieModal");
        const closeModalBtn = document.getElementById("closeModal");
        const modalPoster = document.getElementById("modalPoster");
        const modalTitle = document.getElementById("modalTitle");
        const modalYear = document.getElementById("modalYear");
        const modalGenres = document.getElementById("modalGenres");
        const modalRating = document.getElementById("modalRating");
        const modalRatingCount = document.getElementById("modalRatingCount");
        const modalLikeBtn = document.getElementById("modalLikeBtn");
        const similarMovies = document.getElementById("similarMovies");

        document.addEventListener("DOMContentLoaded", () => {
            performSearch();
            setupEvents();
        });

        function setupEvents() {
            homeTab.addEventListener("click", () => switchTab("home"));
            recommendTab.addEventListener("click", () => switchTab("recommend"));

            searchBtn.addEventListener("click", performSearch);

            searchInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    performSearch();
                }
            });

            genreSelect.addEventListener("change", performSearch);

            closeModalBtn.addEventListener("click", closeMovieModal);

            movieModal.addEventListener("click", (e) => {
                if (e.target === movieModal) {
                    closeMovieModal();
                }
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && !movieModal.classList.contains("hidden")) {
                    closeMovieModal();
                }
            });

            recommendBtn.addEventListener("click", getRecommendations);
        }

        function switchTab(tab) {
            if (tab === "home") {
                homeSection.classList.remove("hidden");
                recommendSection.classList.add("hidden");
                homeTab.classList.add("active");
                recommendTab.classList.remove("active");
            } else {
                homeSection.classList.add("hidden");
                recommendSection.classList.remove("hidden");
                homeTab.classList.remove("active");
                recommendTab.classList.add("active");
                renderLikedMovies();
            }
        }

        async function performSearch() {
            const q = searchInput.value.trim();
            const genre = genreSelect.value;

            moviesGrid.innerHTML = `<div class="info-text">Memuat data film...</div>`;

            try {
                const params = new URLSearchParams();
                if (q) params.append("q", q);
                params.append("genre", genre);

                const response = await fetch(`/search?${params.toString()}`);
                const data = await response.json();

                if (data.success) {
                    movieCount.textContent = `${data.count} film ditemukan`;
                    sectionTitle.textContent = (q || genre !== "all") ? "Hasil Pencarian" : "Film Populer";
                    renderMovieCards(data.movies, moviesGrid);
                } else {
                    moviesGrid.innerHTML = `<div class="info-text">Data film tidak ditemukan.</div>`;
                }
            } catch (error) {
                moviesGrid.innerHTML = `<div class="info-text error">Terjadi kesalahan saat memuat data.</div>`;
            }
        }

        function renderMovieCards(movies, container) {
            if (!movies || movies.length === 0) {
                container.innerHTML = `<div class="info-text">Tidak ada film yang cocok.</div>`;
                return;
            }

            container.innerHTML = movies.map(movie => {
                const isLiked = state.likedMovies.has(movie.movieId);
                const genresText = movie.genres ? movie.genres.split("|").join(", ") : "-";
                const title = movie.clean_title || movie.title;

                return `
                    <div class="movie-card">
                        <img src="${movie.poster_url}" alt="${escapeHtml(title)}">
                        <div class="movie-card-body">
                            <h3>${escapeHtml(title)}</h3>
                            <p><strong>Genre:</strong> ${escapeHtml(genresText)}</p>
                            <p><strong>Rating:</strong> ${movie.avg_rating || 0}</p>
                            <div class="card-actions">
                                <button class="detail-btn" type="button" onclick="openMovieDetail(${movie.movieId})">Detail</button>
                                <button
                                    class="like-btn ${isLiked ? 'liked' : ''}"
                                    type="button"
                                    onclick="toggleLikeFromCard(event, ${movie.movieId}, ${JSON.stringify(title)}, ${JSON.stringify(movie.poster_url)}, ${JSON.stringify(genresText)}, ${movie.avg_rating || 0})"
                                >
                                    ${isLiked ? "Dipilih" : "Pilih"}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        async function openMovieDetail(movieId) {
            try {
                const response = await fetch(`/movie/${movieId}`);
                const data = await response.json();

                if (!data.success) return;

                const movie = data.movie;
                state.currentMovie = movie;

                const title = movie.clean_title || movie.title;
                const genresText = movie.genres ? movie.genres.split("|").join(", ") : "-";

                modalPoster.src = movie.poster_url;
                modalTitle.textContent = title;
                modalYear.textContent = movie.year || "-";
                modalGenres.textContent = genresText;
                modalRating.textContent = movie.avg_rating || 0;
                modalRatingCount.textContent = movie.rating_count || 0;

                const isLiked = state.likedMovies.has(movie.movieId);
                modalLikeBtn.textContent = isLiked ? "Hapus dari Pilihan" : "Pilih Film";
                modalLikeBtn.classList.toggle("selected", isLiked);

                modalLikeBtn.onclick = () => {
                    toggleLikeMovie(movie.movieId, title, movie.poster_url, genresText, movie.avg_rating || 0);
                    const nowLiked = state.likedMovies.has(movie.movieId);
                    modalLikeBtn.textContent = nowLiked ? "Hapus dari Pilihan" : "Pilih Film";
                    modalLikeBtn.classList.toggle("selected", nowLiked);
                    performSearch();
                };

                if (data.similar_movies && data.similar_movies.length > 0) {
                    similarMovies.innerHTML = data.similar_movies.map(sim => {
                        const simTitle = sim.clean_title || sim.title;
                        const simGenres = sim.genres ? sim.genres.split("|").join(", ") : "-";

                        return `
                            <div class="movie-card small-card">
                                <img src="${sim.poster_url}" alt="${escapeHtml(simTitle)}">
                                <div class="movie-card-body">
                                    <h3>${escapeHtml(simTitle)}</h3>
                                    <p><strong>Genre:</strong> ${escapeHtml(simGenres)}</p>
                                    <p><strong>Rating:</strong> ${sim.avg_rating || 0}</p>
                                    <div class="card-actions">
                                        <button class="detail-btn" type="button" onclick="openMovieDetail(${sim.movieId})">Detail</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join("");
                } else {
                    similarMovies.innerHTML = `<div class="info-text">Belum ada film serupa.</div>`;
                }

                movieModal.classList.remove("hidden");
                document.body.classList.add("modal-open");
            } catch (error) {
                console.error(error);
            }
        }

        function closeMovieModal() {
            movieModal.classList.add("hidden");
            document.body.classList.remove("modal-open");
        }

        function toggleLikeFromCard(event, movieId, title, poster, genres, rating) {
            event.stopPropagation();
            toggleLikeMovie(movieId, title, poster, genres, rating);
            performSearch();
            renderLikedMovies();
        }

        function toggleLikeMovie(movieId, title, poster, genres, rating) {
            if (state.likedMovies.has(movieId)) {
                state.likedMovies.delete(movieId);
            } else {
                state.likedMovies.set(movieId, {
                    movieId,
                    title,
                    poster,
                    genres,
                    rating
                });
            }

            recommendBtn.disabled = state.likedMovies.size === 0;
            renderLikedMovies();
        }

        function renderLikedMovies() {
            if (state.likedMovies.size === 0) {
                likedMovies.innerHTML = `<div class="info-text">Belum ada film yang dipilih.</div>`;
                recommendBtn.disabled = true;
                return;
            }

            recommendBtn.disabled = false;

            likedMovies.innerHTML = Array.from(state.likedMovies.values()).map(movie => `
                <div class="liked-item">
                    <img src="${movie.poster}" alt="${escapeHtml(movie.title)}">
                    <div>
                        <h4>${escapeHtml(movie.title)}</h4>
                        <p>${escapeHtml(movie.genres)}</p>
                        <button type="button" onclick="removeLikedMovie(${movie.movieId})">Hapus</button>
                    </div>
                </div>
            `).join("");
        }

        function removeLikedMovie(movieId) {
            state.likedMovies.delete(movieId);
            renderLikedMovies();
            performSearch();
        }

        async function getRecommendations() {
            const liked_movie_ids = Array.from(state.likedMovies.keys());

            if (liked_movie_ids.length === 0) return;

            recommendGrid.innerHTML = `<div class="info-text">Memproses rekomendasi...</div>`;

            try {
                const response = await fetch("/recommend", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ liked_movie_ids })
                });

                const data = await response.json();

                if (data.success) {
                    renderMovieCards(data.recommendations, recommendGrid);
                } else {
                    recommendGrid.innerHTML = `<div class="info-text">Rekomendasi tidak tersedia.</div>`;
                }
            } catch (error) {
                recommendGrid.innerHTML = `<div class="info-text error">Gagal memproses rekomendasi.</div>`;
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
